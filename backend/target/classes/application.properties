spring.application.name=cloudsnap
server.port=8080
spring.data.mongodb.uri=mongodb://localhost:27017/cloudsnap

# AWS S3
# NOTE: use ONE region that matches where "tarun-cloud-share" actually lives.
aws.access.key=${AWS_ACCESS_KEY}
aws.secret.key=${AWS_SECRET_KEY}
aws.s3.bucketname=tarun-cloud-share
aws.s3.region=eu-north-1

# JWT
jwt.secret=${JWT_SECRET:cloudsnap-super-secret-key-change-this-in-prod-32bytesmin}
jwt.expiration.ms=86400000

# Upload limits
app.max-images-per-user=5
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Used to build the share link returned to the frontend
app.frontend.base-url=http://localhost:5173
